name: exectoken
superscalar: false
source: |
  \ ذ´ذµذ¼ذ¾ذ½رپر‚ر€ذ°ر†ذ¸رڈ execution token (' ذ¸ execute)
  \ ذ؟ر€ذ¾ر†ذµذ´رƒر€ذ° ذ²ر‹ذ±ذ¸ر€ذ°ذµر‚رپرڈ ذ²ذ¾ ذ²ر€ذµذ¼رڈ ذ²ر‹ذ؟ذ¾ذ»ذ½ذµذ½ذ¸رڈ
  \ ذµر‘ ذ°ذ´ر€ذµرپ (xt) ر…ر€ذ°ذ½ذ¸ر‚رپرڈ ذ؛ذ°ذ؛ ذ´ذ°ذ½ذ½ر‹ذµ ذ¸ ذ²ر‹ذ·ر‹ذ²ذ°ذµر‚رپرڈ ذ؛ذ¾رپذ²ذµذ½ذ½ذ¾

  variable num
  variable digit
  variable temp
  variable count
  variable bufptr
  : extract-digits
    0 count !
    BEGIN
      num @ 10 / temp !
      num @ temp @ 10 * - digit !
      100 count @ + bufptr !
      digit @ bufptr @ !
      temp @ num !
      count @ 1 + count !
      num @ 0 =
    UNTIL ;
  : print-digits
    BEGIN
      count @ 1 - count !
      100 count @ + bufptr !
      bufptr @ @ 48 +
      emit
      count @ 0 =
    UNTIL ;
  : print-num extract-digits print-digits ;

  : double 2 * ;
  : triple 3 * ;

  variable op
  variable flag

  1 flag !

  flag @ 0 = IF
    ' double op !
  ELSE
    ' triple op !
  THEN

  7 op @ execute
  num ! print-num
  32 emit

  ' double op !
  7 op @ execute
  num ! print-num
  halt
