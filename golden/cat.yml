name: cat
superscalar: false
source: |
  \ вывод введённых символов (ввод через прерывания по расписанию)
  variable ch
  : irq-handler
    key ch !
    ch @ emit
    iret
  ;
  irq-handler set-irq-handler
  BEGIN 0 UNTIL
input: cat
output: "cat\0"
machine_code: |
  0000 - 68000002 - JMP 2  ; IP <- 2
  0001 - 68000011 - JMP 17  ; IP <- 17
  0002 - 10000000 - STORE 0  ; mem[0] <- AC
  0003 - B0000000 - IN 0  ; AC <- port[0]
  0004 - 10000001 - STORE 1  ; mem[1] <- AC
  0005 - 0A0000CB - LOAD #203  ; AC <- #203
  0006 - 100000C8 - STORE 200  ; mem[200] <- AC
  0007 - 08000001 - LOAD 1  ; AC <- mem[1]
  0008 - 140000C8 - STORE @200  ; mem[mem[200]] <- AC
  0009 - 08000000 - LOAD 0  ; AC <- mem[0]
  000A - 10000000 - STORE 0  ; mem[0] <- AC
  000B - 0A0000CB - LOAD #203  ; AC <- #203
  000C - 100000C8 - STORE 200  ; mem[200] <- AC
  000D - 0C0000C8 - LOAD @200  ; AC <- mem[mem[200]]
  000E - B8000001 - OUT 1  ; port[1] <- AC
  000F - C0000000 - IRET 0  ; interrupt return
  0010 - A8000000 - RET 0  ; return
  0011 - 0A000000 - LOAD #0  ; AC <- #0
  0012 - 70000011 - JZ 17  ; if Z: IP <- 17
  0013 - C8000000 - HALT 0  ; stop
