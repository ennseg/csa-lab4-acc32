name: cat
superscalar: false
source: |
  \ вывод введённых символов (ввод через прерывания по расписанию)
  variable ch
  : irq-handler
    key ch !
    ch @ emit
    iret
  ;
  irq-handler set-irq-handler
  BEGIN 0 UNTIL
input: cat
output: c
machine_code: |
  0000 - 68000002 - JMP 2  ; IP <- 2
  0001 - 68000011 - JMP 17  ; IP <- 17
  0002 - 100007D0 - STORE 2000  ; mem[2000] <- AC
  0003 - B0000000 - IN 0  ; AC <- port[0]
  0004 - 100007D1 - STORE 2001  ; mem[2001] <- AC
  0005 - 0A000000 - LOAD #0  ; AC <- #0
  0006 - 10000898 - STORE 2200  ; mem[2200] <- AC
  0007 - 080007D1 - LOAD 2001  ; AC <- mem[2001]
  0008 - 14000898 - STORE @2200  ; mem[mem[2200]] <- AC
  0009 - 080007D0 - LOAD 2000  ; AC <- mem[2000]
  000A - 100007D0 - STORE 2000  ; mem[2000] <- AC
  000B - 0A000000 - LOAD #0  ; AC <- #0
  000C - 10000898 - STORE 2200  ; mem[2200] <- AC
  000D - 0C000898 - LOAD @2200  ; AC <- mem[mem[2200]]
  000E - B8000001 - OUT 1  ; port[1] <- AC
  000F - C0000000 - IRET 0  ; interrupt return
  0010 - A8000000 - RET 0  ; return
  0011 - 0A000000 - LOAD #0  ; AC <- #0
  0012 - 70000011 - JZ 17  ; if Z: IP <- 17
  0013 - C8000000 - HALT 0  ; stop
